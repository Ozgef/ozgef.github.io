
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Działające przykłady</title>

<style>
body {
    font-family: Arial;
    background: #1e272e;
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #00a8ff;
}

.card {
    background: #2f3640;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

button {
    padding: 8px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #00a8ff;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 10px;
    background: #000;
    padding: 10px;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>📊 Działające przykłady</h1>

<!-- COUNT -->
<div class="card">
<h2>count()</h2>
<p>Tablica: ["Ala","Ola","Ela"]</p>
<button onclick="countFunc()">Pokaż wynik</button>
<div class="result" id="count"></div>
</div>

<!-- SORT -->
<div class="card">
<h2>sort()</h2>
<p>Tablica: [5,2,9,1]</p>
<button onclick="sortFunc()">Sortuj rosnąco</button>
<div class="result" id="sort"></div>
</div>

<!-- RSORT -->
<div class="card">
<h2>rsort()</h2>
<p>Tablica: [5,2,9,1]</p>
<button onclick="rsortFunc()">Sortuj malejąco</button>
<div class="result" id="rsort"></div>
</div>

<!-- ASORT -->
<div class="card">
<h2>asort()</h2>
<p>Tablica: {a:5, b:2, c:9}</p>
<button onclick="asortFunc()">Sortuj po wartości</button>
<div class="result" id="asort"></div>
</div>

<!-- KSORT -->
<div class="card">
<h2>ksort()</h2>
<p>Tablica: {c:5, a:2, b:9}</p>
<button onclick="ksortFunc()">Sortuj po kluczu</button>
<div class="result" id="ksort"></div>
</div>

<!-- FILE EXISTS -->
<div class="card">
<h2>file_exists()</h2>
<button onclick="fileExists()">Sprawdź plik</button>
<div class="result" id="file"></div>
</div>

<!-- DATE -->
<div class="card">
<h2>date()</h2>
<button onclick="showDate()">Pokaż datę</button>
<div class="result" id="date"></div>
</div>

<script>

// COUNT
function countFunc(){
 let tab=["Ala","Ola","Ela"];
 document.getElementById("count").innerText = tab.length;
}

// SORT
function sortFunc(){
 let tab=[5,2,9,1];
 tab.sort((a,b)=>a-b);
 document.getElementById("sort").innerText = tab;
}

// RSORT
function rsortFunc(){
 let tab=[5,2,9,1];
 tab.sort((a,b)=>b-a);
 document.getElementById("rsort").innerText = tab;
}

// ASORT (po wartości)
function asortFunc(){
 let tab={a:5,b:2,c:9};
 let sorted = Object.entries(tab).sort((a,b)=>a[1]-b[1]);
 document.getElementById("asort").innerText = JSON.stringify(sorted);
}

// KSORT (po kluczu)
function ksortFunc(){
 let tab={c:5,a:2,b:9};
 let sorted = Object.entries(tab).sort();
 document.getElementById("ksort").innerText = JSON.stringify(sorted);
}

// FILE EXISTS (symulacja)
function fileExists(){
 document.getElementById("file").innerText = "plik.txt istnieje (symulacja)";
}

// DATE
function showDate(){
 let d = new Date();
 document.getElementById("date").innerText = d.toLocaleString();
}

</script>

</body>
</html>
```
