<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dynamiczna tabliczka mnożenia</title>

<style>
body{
    font-family: Arial;
    text-align: center;
}

table{
    border-collapse: collapse;
    margin: 20px auto;
}

td, th{
    border: 1px solid black;
    padding: 8px;
    width: 40px;
}

th{
    background: #ddd;
}
</style>
</head>

<body>

<h1>Tabliczka mnożenia</h1>

<label>Do ilu liczb?</label>
<input type="number" id="size" value="10" min="1">
<button onclick="generate()">Generuj</button>

<br><br>

<table id="table"></table>

<script>
function generate(){

    const size = parseInt(document.getElementById("size").value);

    // utworzenie tablicy 2D
    let data = new Array(size);

    for(let i = 0; i <= size; i++){
        data[i] = new Array(size);
    }

    // inicjowanie tablicy
    for(let row = 0; row <= size; row++){
        for(let col = 0; col <= size; col++){
            data[row][col] = row * col;
        }
    }

    const table = document.getElementById("table");
    table.innerHTML = "";

    for(let i = 0; i <= size; i++){
        const tr = document.createElement("tr");

        for(let j = 0; j <= size; j++){
            const cell = document.createElement(i === 0 || j === 0 ? "th" : "td");

            if(i === 0 && j === 0){
                cell.textContent = "×";
            }else if(i === 0){
                cell.textContent = j;
            }else if(j === 0){
                cell.textContent = i;
            }else{
                cell.textContent = data[i][j];
            }

            tr.appendChild(cell);
        }

        table.appendChild(tr);
    }
}
</script>

</body>
</html>
